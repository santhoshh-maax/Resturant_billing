<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Royal Feast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="menu.html">
                <i class="fas fa-utensils"></i> Royal Feast
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link active" href="menu.html"><i class="fas fa-list me-1"></i>Menu</a>
                    </li>
                    <li class="nav-item position-relative">
                        <a class="nav-link" href="cart.html">
                            <i class="fas fa-shopping-cart me-1"></i>Cart
                            <span class="cart-badge" id="cartCount">0</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">
                            <i class="fas fa-sign-out-alt me-1"></i>Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-wrapper">
        <div class="content-wrapper">
            <div class="container">
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="fas fa-search text-secondary"></i>
                            </span>
                            <input type="text" class="form-control search-bar border-start-0" id="searchInput" placeholder="Search menu items..." oninput="filterMenu()">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="category-filter text-md-end mt-2 mt-md-0" id="categoryFilter">
                            <button class="btn active" data-category="All" onclick="filterByCategory('All', this)">All</button>
                            <button class="btn" data-category="Starters" onclick="filterByCategory('Starters', this)"><i class="fas fa-egg me-1"></i>Starters</button>
                            <button class="btn" data-category="Main Course" onclick="filterByCategory('Main Course', this)"><i class="fas fa-drumstick-bite me-1"></i>Main Course</button>
                            <button class="btn" data-category="Drinks" onclick="filterByCategory('Drinks', this)"><i class="fas fa-glass-martini me-1"></i>Drinks</button>
                            <button class="btn" data-category="Desserts" onclick="filterByCategory('Desserts', this)"><i class="fas fa-cake me-1"></i>Desserts</button>
                        </div>
                    </div>
                </div>

                <div id="menuLoader" class="text-center py-5">
                    <div class="spinner-border text-danger" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>

                <div class="row g-4" id="menuContainer"></div>
            </div>
        </div>

        <footer class="footer">
            <div class="container">
                <p class="mb-0">&copy; 2024 <span class="gold">Royal Feast</span> Restaurant. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/menu.js"></script>
</body>
</html>
