<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Royal Feast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-2 col-md-3 p-0">
                <div class="admin-sidebar">
                    <div class="sidebar-brand">
                        <h4><i class="fas fa-utensils me-2"></i>Royal Feast</h4>
                        <small class="text-muted">Admin Panel</small>
                    </div>
                    <ul class="nav flex-column mt-3">
                        <li class="nav-item">
                            <a class="nav-link active" href="dashboard.html"><i class="fas fa-tachometer-alt"></i>Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="menu-management.html"><i class="fas fa-utensils"></i>Menu Management</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="orders.html"><i class="fas fa-shopping-cart"></i>Orders</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="reports.html"><i class="fas fa-chart-bar"></i>Reports</a>
                        </li>
                        <li class="nav-item mt-4">
                            <a class="nav-link text-danger" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Logout</a>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="col-lg-10 col-md-9 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold"><i class="fas fa-tachometer-alt text-danger me-2"></i>Dashboard</h3>
                    <span class="text-muted" id="currentDateTime"></span>
                </div>

                <div id="dashboardLoader" class="text-center py-5">
                    <div class="spinner-border text-danger" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>

                <div class="row g-4 mb-4" id="statsCards" style="display:none">
                    <div class="col-md-3">
                        <div class="dashboard-stat-card stat-card-red">
                            <h6 class="stat-label">Total Orders</h6>
                            <h2 class="stat-value" id="totalOrders">0</h2>
                            <i class="fas fa-shopping-bag stat-icon"></i>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="dashboard-stat-card stat-card-gold">
                            <h6 class="stat-label">Total Revenue</h6>
                            <h2 class="stat-value" id="totalRevenue">₹0</h2>
                            <i class="fas fa-rupee-sign stat-icon"></i>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="dashboard-stat-card stat-card-dark">
                            <h6 class="stat-label">Menu Items</h6>
                            <h2 class="stat-value" id="totalMenuItems">0</h2>
                            <i class="fas fa-utensils stat-icon"></i>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="dashboard-stat-card stat-card-success">
                            <h6 class="stat-label">Today's Sales</h6>
                            <h2 class="stat-value" id="todaySales">₹0</h2>
                            <i class="fas fa-chart-line stat-icon"></i>
                        </div>
                    </div>
                </div>

                <div class="card" id="recentOrdersCard" style="display:none">
                    <div class="card-header">
                        <i class="fas fa-clock me-2"></i>Recent Orders
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-custom mb-0">
                                <thead>
                                    <tr>
                                        <th>Order ID</th>
                                        <th>Customer</th>
                                        <th>Amount</th>
                                        <th>Payment</th>
                                        <th>Date</th>
                                    </tr>
                                </thead>
                                <tbody id="recentOrdersTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/admin-dashboard.js"></script>
</body>
</html>
