<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Feast - Restaurant Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="restaurant-logo">
                <i class="fas fa-utensils"></i>
                <h2>Royal Feast</h2>
                <p>Fine Dining Restaurant</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="fas fa-user text-danger"></i></span>
                        <input type="text" class="form-control" id="username" placeholder="Enter username" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="fas fa-lock text-danger"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Login As</label>
                    <div class="d-flex gap-3">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="role" id="roleCustomer" value="customer" checked>
                            <label class="form-check-label" for="roleCustomer">
                                <i class="fas fa-user me-1"></i>Customer
                            </label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="role" id="roleAdmin" value="admin">
                            <label class="form-check-label" for="roleAdmin">
                                <i class="fas fa-user-tie me-1"></i>Admin
                            </label>
                        </div>
                    </div>
                </div>

                <div id="loginError" class="alert alert-danger d-none"></div>

                <button type="submit" class="btn btn-primary-custom w-100 py-2">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted small mb-1">Demo Credentials</p>
                <p class="small mb-0">Admin: admin / password123</p>
                <p class="small">Customer: customer1 / password123</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
